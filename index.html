<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Arıza Bildirimi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#EDF0F4;padding:12px}
.kart{background:#fff;border-radius:14px;overflow:hidden;max-width:430px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.logo-band{background:#1A1A2E;padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
.logo-band img{height:28px}
.logo-band span{font-size:10px;color:rgba(255,255,255,.4)}
.hdr{background:linear-gradient(150deg,#7F0010,#C8001A);padding:14px 16px 18px}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-ico{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.hdr-ttl{color:#fff;font-size:19px;font-weight:700}
.hdr-ttl small{display:block;font-size:11px;font-weight:400;opacity:.7;margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:30px;font-size:13px;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;background:#F5A623;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.body{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
label{display:block;font-size:11px;font-weight:600;color:#8C919E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #E2E4E9;border-radius:10px;font-size:14px;background:#F4F5F7;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:#1A3A6B;background:#fff}
input[readonly]{background:#E2E4E9;color:#8C919E;cursor:default}
textarea{min-height:88px;resize:none;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pb{padding:9px 4px;border-radius:8px;border:1.5px solid #E2E4E9;background:#F4F5F7;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:#555;font-family:inherit;width:100%}
.pb em{font-style:normal;font-size:18px;display:block;margin-bottom:2px}
.pb small{display:block;font-size:9px;font-weight:400;opacity:.75;margin-top:1px}
.pb.sk{border-color:#C8001A;background:#FFF0F2;color:#7F0010}
.pb.sy{border-color:#E65C00;background:#FFF5EE;color:#7A3000}
.pb.so{border-color:#B8860B;background:#FFFBEA;color:#6B4E00}
.pb.sd{border-color:#185FA5;background:#EBF3FF;color:#0A3570}
.req{color:#C8001A}
/* GÖNDER BUTONU */
.wa-btn{display:block;width:100%;padding:15px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;text-align:center;cursor:pointer;font-family:inherit;text-decoration:none;margin-top:4px}
.note{text-align:center;font-size:10px;color:#aaa;margin-top:4px}
/* BAŞARI */
.ok{display:none;position:fixed;inset:0;background:rgba(10,22,40,.95);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.ok.show{display:flex}
.ok-ico{font-size:60px;margin-bottom:14px}
.ok-ttl{color:#fff;font-size:24px;font-weight:700;margin-bottom:6px}
.ok-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:20px}
.ok-wa{display:block;background:#25D366;color:#fff;border-radius:11px;padding:14px 20px;font-size:15px;font-weight:700;text-decoration:none;width:100%;max-width:300px;margin:6px auto;text-align:center}
.ok-back{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:11px;padding:12px 24px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:10px;display:block;width:100%;max-width:300px;margin:10px auto 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A1628;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;white-space:nowrap;z-index:800;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

      <div class="pgrid">
        <button class="pb" data-v="KRİTİK" data-c="sk" onclick="secPrio(this)"><em>🔴</em>KRİTİK<small>Duruş</small></button>
        <button class="pb" data-v="YÜKSEK" data-c="sy" onclick="secPrio(this)"><em>🟠</em>YÜKSEK<small>Kısmi</small></button>
        <button class="pb" data-v="ORTA"   data-c="so" onclick="secPrio(this)"><em>🟡</em>ORTA<small>Yakın</small></button>
        <button class="pb" data-v="DÜŞÜK"  data-c="sd" onclick="secPrio(this)"><em>🟢</em>DÜŞÜK<small>Planlı</small></button>

      <div><label>Üretim Durumu</label><select id="uretim"><option>🛑 Üretim durdu</option><option>⚠️ Kısmen devam</option><option>✅ Devam ediyor</option></select></div>
      <div><label>Tahmini Duruş</label><select id="durus"><option>Bilinmiyor</option><option>0–30 dk</option><option>30–60 dk</option><option>1–4 saat</option><option>4+ saat</option></select></div>

<div class="ok" id="ok">
  <div class="ok-ico">✅</div>
  <div class="ok-ttl">Bildirim Hazır!</div>
  <div class="ok-sub" id="ok-no"></div>
  <a id="wa-mudur" href="#" class="ok-wa" target="_blank">💬 Müdüre Gönder</a>
  <a id="wa-yard"  href="#" class="ok-wa" target="_blank">💬 Yardımcıya Gönder</a>
  <button class="ok-back" onclick="sifirla()">Yeni Bildirim Aç</button>
</div>

<script>
var AYAR = {
  sorumlu:  { ad: 'Bakım Sorumlusu',  tel: '905345106208' },  // Tüm arıza + bakım bildirimleri
  sheets:   'https://script.google.com/macros/s/AKfycbx6p1jWFUmXUajFaVq84pG9so9pwtg9v4xCVKHPfxSlFhEGNPiugt7ScdJXHjkpEbZt/exec',
  kapatUrl: 'https://rad-marzipan-fb1557.netlify.app/kapat.html'
};

var prio = '';
var qrMakina = new URLSearchParams(location.search).get('m');

function pad(n){ return String(n).padStart(2,'0'); }
function simdi(){
  var d=new Date();
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function bildirimNo(){
  var d=new Date();
  return 'ARZ-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'-'+Math.floor(Math.random()*900+100);
}

document.getElementById('tarih').value = simdi();

if(qrMakina){
  var sel=document.getElementById('mak');
  for(var i=0;i<sel.options.length;i++){
    if(sel.options[i].value.indexOf(qrMakina)===0){
      sel.selectedIndex=i;
      guncelBadge(sel.options[i].value);
      break;
    }
  }
  sel.disabled=true;
  document.getElementById('mak-satir').style.display='none';
} else {
  document.getElementById('badge-txt').textContent='Makina seçiniz';
}

document.getElementById('mak').addEventListener('change',function(){ guncelBadge(this.value); });

function guncelBadge(v){
  var a=v.split('|');
  document.getElementById('badge-txt').textContent=(a[0]&&a[1])?a[0]+' – '+a[1]:'Makina seçiniz';
}

function secPrio(btn){
  document.querySelectorAll('.pb').forEach(function(b){b.className='pb';});
  btn.className='pb '+btn.dataset.c;
  prio=btn.dataset.v;
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show';
  setTimeout(function(){t.className='toast';},2500);
}

function gonder(){
  var mv  = document.getElementById('mak').value;
  var kisi= document.getElementById('kisi').value.trim();
  var acik= document.getElementById('aciklama').value.trim();
  var urt = document.getElementById('uretim').value;
  var dur = document.getElementById('durus').value;
  var tar = document.getElementById('tarih').value;

  if(!mv)   { toast('⚠️ Makina seçiniz');           return false; }
  if(!kisi) { toast('⚠️ Adınızı giriniz');           return false; }
  if(!acik) { toast('⚠️ Arıza açıklaması yazınız'); return false; }
  if(!prio) { toast('⚠️ Öncelik seçiniz');           return false; }

  var a  = mv.split('|');
  var no = bildirimNo();
  var pe = {KRİTİK:'🔴',YÜKSEK:'🟠',ORTA:'🟡',DÜŞÜK:'🟢'};

  var msg = '🚨 *ARIZA BİLDİRİMİ*\n'
    +'━━━━━━━━━━━━━━━━━\n'
    +'📋 No: '+no+'\n'
    +'📅 '+tar+'\n'
    +'👤 Bildiren: '+kisi+'\n\n'
    +'⚙️ *'+(a[0]||'')+' – '+(a[1]||'')+'*\n'
    +'📍 '+(a[2]||'')+'\n\n'
    +(pe[prio]||'⚠️')+' *'+prio+'*\n\n'
    +'🔍 '+acik+'\n\n'
    +'🏭 '+urt+' | ⏱️ '+dur+'\n'
    +'━━━━━━━━━━━━━━━━━\n'
    +'_IATF 16949:2016_\n'
    +'🔧 Arıza Kapat: https://rad-marzipan-fb1557.netlify.app/kapat.html?no='+encodeURIComponent(no)+'&makina='+encodeURIComponent(a[0]||'')+'&tarih='+encodeURIComponent(tar);

  var sheetsParams = 'bildirimNo='+encodeURIComponent(no)
    +'&tarih='+encodeURIComponent(tar)
    +'&kisi='+encodeURIComponent(kisi)
    +'&makinaKod='+encodeURIComponent(a[0]||'')
    +'&makinaAd='+encodeURIComponent(a[1]||'')
    +'&makinaKonum='+encodeURIComponent(a[2]||'')
    +'&oncelik='+encodeURIComponent(prio)
    +'&aciklama='+encodeURIComponent(acik)
    +'&uretim='+encodeURIComponent(urt)
    +'&durus='+encodeURIComponent(dur)
    +'&durum='+encodeURIComponent('Açık');

  var sheetsUrl  = AYAR.sheets+'?'+sheetsParams;
  var waUrl      = 'https://wa.me/'+AYAR.sorumlu.tel+'?text='+encodeURIComponent(msg);

  // Başarı ekranı
  document.getElementById('ok-no').textContent = '📋 '+no;
  document.getElementById('wa-mudur').textContent = '💬 '+AYAR.sorumlu.ad+' – Gönder';
  document.getElementById('wa-mudur').href = sheetsUrl;
  document.getElementById('wa-mudur').onclick = function(e){
    e.preventDefault();
    window.open(sheetsUrl, '_blank');
    setTimeout(function(){
      window.location.href = waUrl;
    }, 1500);
  };

  // Yardımcı butonunu gizle — tek kişi yeterli
  var yard = document.getElementById('wa-yard');
  if(yard) yard.style.display = 'none';

  document.getElementById('ok').className = 'ok show';
  return false;
}

function sifirla(){
  document.getElementById('ok').className='ok';
  document.getElementById('kisi').value='';
  document.getElementById('aciklama').value='';
  document.querySelectorAll('.pb').forEach(function(b){b.className='pb';});
  prio='';
  document.getElementById('tarih').value=simdi();
  if(!qrMakina){
    document.getElementById('mak').value='';
    document.getElementById('badge-txt').textContent='Makina seçiniz';
  }
}
</script>
</body>
</html>
